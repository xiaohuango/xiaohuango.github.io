<!DOCTYPE html>
<html>

<head>
    <title>下拉菜单示例</title>
    <style>
        /* 隐藏下拉菜单中的子菜单 */
        .sub-menu {
            display: none;
        }

        .caidan11 {
            height: 50px;
            width: 200px;
            text-align: center;
            color: #fff;
            background-color: #10b981;
        }
    </style>
</head>

<body>

    <!-- 创建下拉菜单 -->
    <select class="caidan11" onchange="showText()">
        <option value="0">请选择一个菜单</option>
        <option value="1">菜单1</option>
        <option value="2">菜单2</option>
        <option value="3">菜单3</option>
    </select>

    <!-- 创建三个子菜单对应的段落文本 -->
    <p id="text1" class="sub-menu">这是菜单1对应的文本。</p>
    <p id="text2" class="sub-menu">这是菜单2对应的文本。</p>
    <p id="text3" class="sub-menu">这是菜单3对应的文本。</p>

    <script>
        // 显示对应的段落文本
        function showText() {
            // 获取下拉菜单选项的值
            var value = document.getElementsByTagName("select")[0].value;

            // 隐藏所有的子菜单
            var subMenus = document.getElementsByClassName("sub-menu");
            for (var i = 0; i < subMenus.length; i++) {
                subMenus[i].style.display = "none";
            }

            // 显示对应的子菜单
            var textId = "text" + value;
            document.getElementById(textId).style.display = "block";
        }
    </script>

</body>

</html>
