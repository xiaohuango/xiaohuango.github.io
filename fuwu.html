    <script>
        // 获取所有的进度步骤和进度条
        var steps = document.querySelectorAll("h2");
        var progress = document.querySelector(".progress-bar-fill");

        // 计算步骤数量
        var numSteps = steps.length;

        // 当前步骤
        var currentStep = 1;

        // 更新进度条和当前步骤
        // function nextStep() {
        //     // 如果已经到达最后一步，不再更新进度条
        //     if (currentStep - 1 == numSteps) {
        //         return;
        //     }

        //     // 更新进度条

        //     // 更新当前步骤
        //     steps[currentStep - 1].classList.remove("current-step");
        //     currentStep++;
        //     steps[currentStep - 1].classList.add("current-step");
        // }
        function nextStep() {
            // 如果已经到达最后一步，不再更新进度条
            if (currentStep - 1 == numSteps) {
                return;
            }

            // 更新进度条
            progress.style.width = (currentStep / numSteps) * 100 + "%";

            // 更新百分比显示
            var percent = Math.floor((currentStep / numSteps) * 100);
            progress.innerHTML = percent + "%";

            // 更新当前步骤
            steps[currentStep - 1].classList.remove("current-step");
            currentStep++;
            steps[currentStep - 1].classList.add("current-step");
        }

    </script>
